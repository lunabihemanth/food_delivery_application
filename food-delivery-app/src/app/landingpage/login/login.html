<div class="min-h-screen bg-gray-950 text-white flex flex-col relative">

  <!-- Isolated Back Button -->
  <button (click)="goBack()"
          class="absolute top-6 left-6 bg-white/10 hover:bg-white/20 text-white px-4 py-2 rounded-full text-sm font-medium backdrop-blur-md border border-white/10 transition">
    ← Back
  </button>

  <!-- Form -->
  <div class="flex-1 flex items-center justify-center px-6">
    <div class="w-full max-w-sm bg-white/5 backdrop-blur-md border border-white/10 rounded-2xl p-8 shadow-2xl">
      
      <!-- Title -->
      <div class="text-center mb-8">
        <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-indigo-600">
          Food Delivery
        </h1>
        <p class="text-gray-400 text-sm mt-2">Sign in with your credentials</p>
      </div>

      <!-- Error message -->
      @if (errorMsg) {
        <div class="bg-red-900/50 border border-red-500/30 text-red-300 text-sm p-3 rounded-xl mb-6 text-center">
          {{ errorMsg }}
        </div>
      }

      <!-- Username  -->
      <div class="mb-4">
        <label class="text-gray-400 text-xs block mb-2 ml-1">Username</label>
        <input
          type="text"
          [(ngModel)]="username"
          placeholder="Username"
          class="w-full p-3 rounded-xl bg-gray-900/50 border border-gray-700 focus:border-indigo-400 outline-none text-white placeholder-gray-500 transition-all"
        />
      </div>

      <!-- Password -->
      <div class="mb-6">
        <label class="text-gray-400 text-xs block mb-2 ml-1">Password</label>
        <input
          type="password"
          [(ngModel)]="password"
          placeholder="Password"
          class="w-full p-3 rounded-xl bg-gray-900/50 border border-gray-700 focus:border-indigo-400 outline-none text-white placeholder-gray-500 transition-all"
        />
      </div>

      <!-- Login Button -->
      <button
        (click)="onLogin()"
        [disabled]="isLoading"
        class="w-full bg-gradient-to-r from-indigo-500 to-indigo-600 hover:from-indigo-600 hover:to-indigo-700 p-3 rounded-xl font-semibold shadow-lg shadow-indigo-500/20 transition-all disabled:opacity-50 disabled:cursor-not-allowed active:scale-95"
      >
        {{ isLoading ? 'Signing in...' : 'Login' }}
      </button>

      <!-- Hint -->
    </div>
  </div>
</div>
