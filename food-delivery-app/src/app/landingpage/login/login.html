

<div class="min-h-screen bg-gray-900 text-white flex flex-col">

  <!-- Header -->
  <div class="bg-gray-800 px-6 py-4 flex items-center gap-4 border-b border-gray-700">
    <button (click)="goBack()" class="text-gray-400 hover:text-white text-xl">←</button>
    <h2 class="text-xl font-bold">Login</h2>
  </div>

  <!-- Form -->
  <div class="flex-1 flex items-center justify-center px-6">
    <div class="w-full max-w-sm bg-gray-800 p-6 rounded-xl border border-gray-700">

      <h1 class="text-2xl font-bold text-orange-400 text-center mb-6">
        Login
      </h1>

      @if (errorMsg) {
        <p class="text-red-400 text-sm mb-4 text-center">
          {{ errorMsg }}
        </p>
      }

      <!-- Username -->
      <input
        type="text"
        [(ngModel)]="username"
        placeholder="Username"
        class="w-full p-3 mb-4 rounded-lg bg-gray-700 border border-gray-600 
               focus:border-orange-400 outline-none"
      />

      <!-- Password -->
      <input
        type="password"
        [(ngModel)]="password"
        placeholder="Password"
        class="w-full p-3 mb-6 rounded-lg bg-gray-700 border border-gray-600 
               focus:border-orange-400 outline-none"
      />

      <!-- Button -->
      <button
        (click)="onLogin()"
        class="w-full bg-orange-500 hover:bg-orange-600 p-3 rounded-lg font-semibold transition"
      >
        Login
      </button>

    </div>
  </div>

</div>
