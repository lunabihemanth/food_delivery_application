<div class="min-h-screen bg-gray-900 text-white pb-28">

  <!-- Header -->
  <div class="bg-gray-800 px-6 py-4 flex items-center gap-4 sticky top-0 z-50">
    <button (click)="goBack()"
      class="text-gray-400 hover:text-white text-xl">←</button>
    <h2 class="text-xl font-bold">Checkout</h2>
  </div>

  <div class="px-6 pt-6 space-y-4">

    <!-- Delivery address -->
    <div class="bg-gray-800 rounded-2xl p-5 border border-gray-700">
      <h3 class="font-bold mb-4">📍 Delivery Address</h3>

      <!-- Address list -->
      <div *ngFor="let addr of addresses"
           (click)="selectedAddress = addr"
           class="p-3 rounded-xl border cursor-pointer transition mb-2"
           [class]="selectedAddress?.addressId === addr.addressId ?
             'border-orange-500 bg-orange-500/10' :
             'border-gray-600'">
        <p class="font-semibold text-sm">{{ addr.addressLine1 }}</p>
        <p class="text-gray-400 text-xs mt-1">
          {{ addr.city }}, {{ addr.state }} - {{ addr.postalCode }}
        </p>
      </div>

      <!-- Add new address toggle -->
      <button (click)="showAddAddress = !showAddAddress"
        class="text-orange-400 text-sm mt-2 hover:underline">
        + Add new address
      </button>

      <!-- Add address form -->
      <div *ngIf="showAddAddress" class="mt-3 space-y-2">
        <input type="text" [(ngModel)]="newAddress.addressLine1"
               placeholder="Address Line 1"
               class="w-full p-2 rounded-lg bg-gray-900 border border-gray-600
                      outline-none text-white text-sm"/>
        <div class="grid grid-cols-2 gap-2">
          <input type="text" [(ngModel)]="newAddress.city"
                 placeholder="City"
                 class="p-2 rounded-lg bg-gray-900 border border-gray-600
                        outline-none text-white text-sm"/>
          <input type="text" [(ngModel)]="newAddress.state"
                 placeholder="State"
                 class="p-2 rounded-lg bg-gray-900 border border-gray-600
                        outline-none text-white text-sm"/>
        </div>
        <input type="text" [(ngModel)]="newAddress.postalCode"
               placeholder="Postal Code"
               class="w-full p-2 rounded-lg bg-gray-900 border border-gray-600
                      outline-none text-white text-sm"/>
        <button (click)="addAddress()"
          class="w-full bg-orange-500 hover:bg-orange-600 p-2
                 rounded-lg text-sm font-semibold transition">
          Save Address
        </button>
      </div>
    </div>

    <!-- Order items summary -->
    <div class="bg-gray-800 rounded-2xl p-5 border border-gray-700">
      <h3 class="font-bold mb-4">🛒 Order Items ({{ totalItems() }})</h3>
      <div *ngFor="let item of cart"
           class="flex justify-between py-2 border-b border-gray-700 last:border-0">
        <span class="text-gray-300 text-sm">
          {{ item.itemName }} × {{ item.quantity }}
        </span>
        <span class="text-orange-400 font-semibold text-sm">
          ₹{{ item.price * item.quantity }}
        </span>
      </div>
      <div class="flex justify-between mt-3 font-bold text-lg">
        <span>Total</span>
        <span class="text-orange-400">₹{{ total() }}</span>
      </div>
    </div>

    <!-- Payment method -->
    <div class="bg-gray-800 rounded-2xl p-5 border border-gray-700">
      <h3 class="font-bold mb-4">💳 Payment Method</h3>
      <div class="space-y-2">
        <div *ngFor="let method of paymentMethods"
             (click)="selectedPayment = method"
             class="flex items-center gap-3 p-3 rounded-xl border cursor-pointer transition"
             [class]="selectedPayment === method ?
               'border-orange-500 bg-orange-500/10' :
               'border-gray-600'">
          <div class="w-5 h-5 rounded-full border-2 flex items-center justify-center flex-shrink-0"
               [class]="selectedPayment === method ?
                 'border-orange-500' : 'border-gray-500'">
            <div *ngIf="selectedPayment === method"
                 class="w-3 h-3 rounded-full bg-orange-500">
            </div>
          </div>
          <span class="text-sm">{{ method }}</span>
        </div>
      </div>
    </div>

  </div>

  <!-- Place order button -->
  <div class="fixed bottom-0 left-0 right-0 p-4 bg-gray-900
              border-t border-gray-700">
    <button (click)="placeOrder()"
      class="w-full bg-orange-500 hover:bg-orange-600 text-white
             p-4 rounded-2xl font-bold text-lg transition"
      [class.opacity-50]="!selectedAddress">
      Place Order → ₹{{ total() }}
    </button>
  </div>

</div>
