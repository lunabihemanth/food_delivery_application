<div class="min-h-screen bg-gray-900 text-white pb-24">

  <!-- Header -->
  <div class="bg-gray-800 px-6 py-4 flex items-center gap-4 sticky top-0 z-50">
    <button (click)="goBack()"
      class="text-gray-400 hover:text-white text-xl">←</button>
    <div class="flex-1">
      <h2 class="text-xl font-bold">{{ restaurant?.restaurantName }}</h2>
      <p class="text-gray-400 text-sm">📍 {{ restaurant?.restaurantAddress }}</p>
    </div>
    <button (click)="goToCart()"
      class="relative bg-orange-500 px-3 py-2 rounded-xl text-sm font-semibold">
      🛒 {{ cartCount() }}
    </button>
  </div>

  <div class="px-6 pt-4">

    <!-- Search -->
    <input type="text" [(ngModel)]="search"
           placeholder="🔍 Search menu items..."
           class="w-full p-3 rounded-xl bg-gray-800 border border-gray-700
                  focus:border-orange-500 outline-none text-white mb-6"/>

    <!-- Menu items -->
    <div class="space-y-3">
      <div *ngFor="let item of filteredItems()"
           class="bg-gray-800 rounded-2xl p-4 border border-gray-700">

        <div class="flex gap-4">

          <!-- Icon -->
          <div class="w-16 h-16 bg-orange-900 rounded-xl flex items-center
                      justify-center text-2xl flex-shrink-0">
            🍴
          </div>

          <!-- Details -->
          <div class="flex-1">
            <h3 class="font-bold">{{ item.itemName }}</h3>
            <p class="text-gray-400 text-sm mt-1">{{ item.description }}</p>

            <div class="flex items-center justify-between mt-3">
              <span class="text-orange-400 font-bold text-lg">₹{{ item.price }}</span>

              <!-- Add button -->
              <div *ngIf="!getCartItem(item.itemId)">
                <button (click)="addToCart(item)"
                  class="bg-orange-500 hover:bg-orange-600 text-white
                         px-4 py-2 rounded-lg text-sm font-semibold transition">
                  + Add
                </button>
              </div>

              <!-- Qty control -->
              <div *ngIf="getCartItem(item.itemId)"
                   class="flex items-center gap-3 bg-gray-900 rounded-lg p-1">
                <button (click)="decreaseQty(item)"
                  class="w-8 h-8 bg-orange-500 rounded-md flex items-center
                         justify-center font-bold hover:bg-orange-600">
                  −
                </button>
                <span class="font-bold w-5 text-center">
                  {{ getCartItem(item.itemId)?.quantity }}
                </span>
                <button (click)="increaseQty(item)"
                  class="w-8 h-8 bg-orange-500 rounded-md flex items-center
                         justify-center font-bold hover:bg-orange-600">
                  +
                </button>
              </div>

            </div>
          </div>

        </div>

      </div>
    </div>

  </div>

  <!-- Floating cart bar -->
  <div *ngIf="cartCount() > 0"
       (click)="goToCart()"
       class="fixed bottom-4 left-4 right-4 bg-orange-500 rounded-2xl p-4
              flex items-center justify-between cursor-pointer
              hover:bg-orange-600 transition z-50">
    <div>
      <p class="text-white font-bold">{{ cartCount() }} items in cart</p>
      <p class="text-orange-100 text-sm">Total: ₹{{ cartTotal() }}</p>
    </div>
    <span class="text-white text-lg font-bold">View Cart →</span>
  </div>

</div>
