<div class="min-h-screen bg-gray-900 flex flex-col items-center justify-center p-6">

  <!-- Back button -->
  <div class="absolute top-6 left-6">
    <button onclick="history.back()"
      class="text-gray-400 hover:text-white text-sm">
      ← Back
    </button>
  </div>

  <!-- Header -->
  <div class="text-center mb-12">
    <h1 class="text-4xl font-bold text-white mb-3">Who are you?</h1>
    <p class="text-gray-400">Select your role to continue</p>
  </div>

  <!-- Role cards -->
  <div class="grid grid-cols-1 gap-6 w-full max-w-md">

    <!-- Customer -->
    <div (click)="selectRole('customer')"
         class="cursor-pointer bg-gray-800 rounded-2xl p-6
                border-2 border-gray-700 hover:border-blue-500
                transition flex items-center gap-5">
      <div class="text-5xl">👤</div>
      <div class="flex-1">
        <h2 class="text-xl font-bold text-white mb-1">Customer</h2>
        <p class="text-gray-400 text-sm">Browse restaurants and order food</p>
      </div>
      <span class="text-gray-400 text-xl">→</span>
    </div>

    <!-- Restaurant -->
    <div (click)="selectRole('restaurant')"
         class="cursor-pointer bg-gray-800 rounded-2xl p-6
                border-2 border-gray-700 hover:border-green-500
                transition flex items-center gap-5">
      <div class="text-5xl">🍽️</div>
      <div class="flex-1">
        <h2 class="text-xl font-bold text-white mb-1">Restaurant</h2>
        <p class="text-gray-400 text-sm">Manage menu and view orders</p>
      </div>
      <span class="text-gray-400 text-xl">→</span>
    </div>

    <!-- Driver -->
    <div (click)="selectRole('driver')"
         class="cursor-pointer bg-gray-800 rounded-2xl p-6
                border-2 border-gray-700 hover:border-purple-500
                transition flex items-center gap-5">
      <div class="text-5xl">🚗</div>
      <div class="flex-1">
        <h2 class="text-xl font-bold text-white mb-1">Driver</h2>
        <p class="text-gray-400 text-sm">Deliver orders and earn money</p>
      </div>
      <span class="text-gray-400 text-xl">→</span>
    </div>

  </div>

</div>
