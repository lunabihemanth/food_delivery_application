<div class="min-h-screen bg-gray-900 flex items-center justify-center p-6">

  <!-- Back -->
  <div class="absolute top-6 left-6">
    <button onclick="history.back()" class="text-gray-400 hover:text-white text-sm">
      ← Back
    </button>
  </div>

  <div class="w-full max-w-md">

    <!-- Header -->
    <div class="text-center mb-8">
      <div class="text-5xl mb-3">{{ getRoleEmoji() }}</div>
      <h1 class="text-3xl font-bold text-white mb-2">
        {{ isLogin ? 'Welcome Back' : 'Create Account' }}
      </h1>
      <p class="text-gray-400 capitalize">
        {{ isLogin ? 'Sign in to continue' : 'Register as ' + role }}
      </p>
    </div>

    <!-- Toggle -->
    <div class="flex bg-gray-800 rounded-xl p-1 mb-6">
      <button (click)="isLogin = true"
        [class]="isLogin ?
          'flex-1 py-2 rounded-lg font-semibold text-sm bg-orange-500 text-white' :
          'flex-1 py-2 rounded-lg font-semibold text-sm text-gray-400'">
        Login
      </button>
      <button (click)="isLogin = false"
        [class]="!isLogin ?
          'flex-1 py-2 rounded-lg font-semibold text-sm bg-orange-500 text-white' :
          'flex-1 py-2 rounded-lg font-semibold text-sm text-gray-400'">
        Register
      </button>
    </div>

    <!-- Form -->
    <div class="bg-gray-800 rounded-2xl p-8 border border-gray-700">

      <!-- Name (register only) -->
      <div *ngIf="!isLogin" class="mb-4">
        <label class="block text-sm text-gray-400 mb-2">Full Name</label>
        <input type="text" [(ngModel)]="form.name" name="name"
               placeholder="Enter your name"
               class="w-full p-3 rounded-lg bg-gray-900 border border-gray-600
                      focus:border-orange-500 outline-none text-white"/>
      </div>

      <!-- Phone (register only) -->
      <div *ngIf="!isLogin" class="mb-4">
        <label class="block text-sm text-gray-400 mb-2">Phone Number</label>
        <input type="text" [(ngModel)]="form.phone" name="phone"
               placeholder="10 digit phone number"
               class="w-full p-3 rounded-lg bg-gray-900 border border-gray-600
                      focus:border-orange-500 outline-none text-white"/>
      </div>

      <!-- Email -->
      <div class="mb-4">
        <label class="block text-sm text-gray-400 mb-2">Email Address</label>
        <input type="email" [(ngModel)]="form.email" name="email"
               placeholder="Enter your email"
               class="w-full p-3 rounded-lg bg-gray-900 border border-gray-600
                      focus:border-orange-500 outline-none text-white"/>
      </div>

      <!-- Password -->
      <div class="mb-6">
        <label class="block text-sm text-gray-400 mb-2">Password</label>
        <input type="password" [(ngModel)]="form.password" name="password"
               placeholder="Enter your password"
               class="w-full p-3 rounded-lg bg-gray-900 border border-gray-600
                      focus:border-orange-500 outline-none text-white"/>
      </div>

      <!-- Error -->
      <div *ngIf="errorMsg"
           class="bg-red-900 border border-red-700 text-red-300
                  rounded-lg p-3 mb-4 text-sm">
        {{ errorMsg }}
      </div>

      <!-- Submit -->
      <button (click)="submit()"
        class="w-full bg-orange-500 hover:bg-orange-600 text-white
               p-3 rounded-lg font-bold text-lg transition">
        {{ isLogin ? 'Sign In' : 'Create Account' }}
      </button>

    </div>

    <!-- Role indicator -->
    <div class="text-center mt-4">
      <span class="text-gray-500 text-sm">Signing in as </span>
      <span class="text-orange-400 font-semibold capitalize text-sm">{{ role }}</span>
      <span class="text-gray-500 text-sm"> · </span>
      <button onclick="history.back()"
        class="text-gray-500 text-sm hover:text-white">
        Change role
      </button>
    </div>

  </div>

</div>
